<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário-Edu 🦉 | A Lovo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0d1117;--deep:#161b27;--card:#1e2535;--card2:#232c3d;
  --border:#2a3248;--teal:#00c9a7;--teal2:#00a896;--amber:#ffb347;
  --rose:#ff6b8a;--sky:#4fc3f7;--purple:#a78bfa;--text:#e8eaf6;
  --muted:#8892b0;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Quicksand',sans-serif;background:var(--night);color:var(--text);min-height:100vh}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 20% 50%,#0a1e30,var(--night) 60%)}
.lbox{background:var(--deep);border:1px solid var(--border);border-radius:24px;
  padding:48px 40px;width:420px;max-width:95vw;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:36px}
.owl{font-size:56px;display:block;animation:fl 3s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(0,201,167,.5))}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.bname{font-family:'Nunito',sans-serif;font-size:30px;font-weight:900;
  background:linear-gradient(135deg,var(--teal),var(--sky));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bsub{font-size:12px;color:var(--muted);margin-top:3px}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.pbtn{background:var(--card);border:2px solid var(--border);border-radius:14px;
  padding:16px 8px;cursor:pointer;transition:all .2s;text-align:center;
  color:var(--muted);font-family:'Quicksand',sans-serif;font-weight:700;font-size:13px}
.pbtn:hover{border-color:var(--teal);color:var(--text);transform:translateY(-2px)}
.pbtn.active{border-color:var(--teal);background:rgba(0,201,167,.1);color:var(--teal)}
.pbtn .pi{font-size:28px;display:block;margin-bottom:6px}
.lfield{margin-bottom:16px}
.lfield label{display:block;font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.lfield input{width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;color:var(--text);
  font-family:'Quicksand',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.lfield input:focus{border-color:var(--teal)}
.btnl{width:100%;background:linear-gradient(135deg,var(--teal),var(--teal2));
  border:none;border-radius:12px;padding:14px;color:#fff;
  font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;
  box-shadow:0 8px 24px rgba(0,201,167,.3);transition:all .2s;margin-top:8px}
.btnl:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,201,167,.4)}
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--deep);border-bottom:1px solid var(--border);
  height:60px;padding:0 24px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-brand{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;
  background:linear-gradient(135deg,var(--teal),var(--sky));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:flex;align-items:center;gap:6px}
.tb-right{display:flex;align-items:center;gap:12px}
.ubadge{display:flex;align-items:center;gap:8px;background:var(--card);
  border:1px solid var(--border);border-radius:40px;padding:5px 14px 5px 5px;
  font-size:13px;font-weight:700}
.av{width:32px;height:32px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:16px}
.rtag{font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:1px;padding:3px 10px;border-radius:20px}
.btn-out{background:transparent;border:1px solid var(--border);border-radius:8px;
  color:var(--muted);padding:6px 14px;font-size:13px;cursor:pointer;
  font-family:'Quicksand',sans-serif;font-weight:600;transition:all .2s}
.btn-out:hover{border-color:var(--rose);color:var(--rose)}
.abody{display:flex;flex:1}
.sidebar{width:220px;background:var(--deep);border-right:1px solid var(--border);
  padding:16px 10px;position:sticky;top:60px;height:calc(100vh - 60px);
  overflow-y:auto;flex-shrink:0}
.ss{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;padding:0 10px;margin:16px 0 6px}
.ss:first-child{margin-top:0}
.nav{display:flex;align-items:center;gap:9px;padding:9px 12px;
  border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;
  color:var(--muted);transition:all .15s;margin-bottom:2px}
.nav:hover{background:var(--card);color:var(--text)}
.nav.active{background:rgba(0,201,167,.12);color:var(--teal);border-left:3px solid var(--teal)}
.nav .ni{font-size:17px;flex-shrink:0}
.main{flex:1;padding:28px;overflow-y:auto}
.phead{margin-bottom:28px}
.phead h1{font-family:'Nunito',sans-serif;font-size:24px;font-weight:900;margin-bottom:4px}
.phead p{color:var(--muted);font-size:14px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden}
.stat .sv{font-family:'Nunito',sans-serif;font-size:32px;font-weight:900;margin-bottom:4px}
.stat .sl{font-size:12px;color:var(--muted);font-weight:600}
.stat .si{position:absolute;top:16px;right:16px;font-size:24px;opacity:.5}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px}
.tcard-head{padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.tcard-head h3{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:11px;font-weight:800;
  color:var(--muted);text-transform:uppercase;letter-spacing:1px;
  background:var(--card2);border-bottom:1px solid var(--border)}
td{padding:13px 16px;font-size:14px;font-weight:600;border-bottom:1px solid rgba(42,50,72,.5)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
  border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.5px;white-space:nowrap}
.bg{background:rgba(74,222,128,.12);color:var(--green)}
.by{background:rgba(251,191,36,.12);color:var(--yellow)}
.br{background:rgba(248,113,113,.12);color:var(--red)}
.bs{background:rgba(79,195,247,.12);color:var(--sky)}
.bp{background:rgba(167,139,250,.12);color:var(--purple)}
.bt{background:rgba(0,201,167,.12);color:var(--teal)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:9px;font-family:'Quicksand',sans-serif;font-size:13px;
  font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-p{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff;
  box-shadow:0 4px 12px rgba(0,201,167,.25)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,201,167,.35)}
.btn-g{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-g:hover{border-color:var(--teal);color:var(--teal)}
.btn-d{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn-d:hover{background:rgba(248,113,113,.25)}
.btn-s{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.btn-s:hover{background:rgba(74,222,128,.25)}
.btn-sm{padding:5px 10px;font-size:12px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:16px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.fg input,.fg select,.fg textarea{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;color:var(--text);font-family:'Quicksand',sans-serif;
  font-size:14px;font-weight:600;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--teal)}
.fg select option{background:var(--card)}
.fg textarea{resize:vertical;min-height:80px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--deep);border:1px solid var(--border);border-radius:20px;
  padding:32px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;
  box-shadow:0 40px 80px rgba(0,0,0,.5)}
.modal h2{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;margin-bottom:24px}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.al-row{display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid rgba(42,50,72,.4)}
.al-row:last-child{border-bottom:none}
.pres-btns{display:flex;gap:6px}
.pbt{width:36px;height:36px;border-radius:8px;border:none;cursor:pointer;
  font-size:14px;font-weight:800;transition:all .2s;background:var(--card2);color:var(--muted)}
.pbt.sel-P{background:rgba(74,222,128,.2);color:var(--green);transform:scale(1.1)}
.pbt.sel-F{background:rgba(248,113,113,.2);color:var(--red);transform:scale(1.1)}
.pbt.sel-J{background:rgba(251,191,36,.2);color:var(--yellow);transform:scale(1.1)}
.nota-in{width:62px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Quicksand',sans-serif;
  font-size:14px;font-weight:700;text-align:center;outline:none}
.nota-in:focus{border-color:var(--teal)}
.aula-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px;margin-bottom:12px;display:flex;align-items:flex-start;
  justify-content:space-between;gap:16px;flex-wrap:wrap}
.aula-info h4{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;margin-bottom:6px}
.ameta{font-size:13px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.filters select,.filters input[type=date]{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:9px 14px;color:var(--text);font-family:'Quicksand',sans-serif;
  font-size:13px;font-weight:700;outline:none;cursor:pointer}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ei{font-size:48px;display:block;margin-bottom:12px;opacity:.4}
#toast{position:fixed;bottom:24px;right:24px;background:var(--teal);color:#fff;
  padding:12px 20px;border-radius:12px;font-size:14px;font-weight:700;
  box-shadow:0 8px 24px rgba(0,201,167,.4);transform:translateY(80px);
  opacity:0;transition:all .3s;z-index:999;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lbox">
    <div class="logo">
      <span class="owl">🦉</span>
      <div class="bname">Diário-Edu</div>
      <div class="bsub">Sistema Escolar · A Lovo</div>
    </div>
    <div class="pgrid">
      <div class="pbtn active" onclick="selPerfil('diretor',this)"><span class="pi">👑</span>Diretor</div>
      <div class="pbtn" onclick="selPerfil('coordenador',this)"><span class="pi">📋</span>Coordenador</div>
      <div class="pbtn" onclick="selPerfil('professor',this)"><span class="pi">👨‍🏫</span>Professor</div>
    </div>
    <div class="lfield"><label>Usuário</label><input id="lu" value="admin" placeholder="seu.nome"></div>
    <div class="lfield"><label>Senha</label><input id="lp" type="password" value="1234" placeholder="••••••••"></div>
    <button class="btnl" onclick="doLogin()">Entrar no Sistema</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-brand">🦉 Diário-Edu</div>
    <div class="tb-right">
      <div class="ubadge">
        <div class="av" id="av">👑</div>
        <span id="uname">Admin</span>
        <span class="rtag" id="rtag">Diretor</span>
      </div>
      <button class="btn-out" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="abody">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="mc"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="mbg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="mtitle"></h2>
    <div id="mbody"></div>
    <div class="modal-btns" id="mbtns"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── DATA ──
const TURMAS=[
  {id:1,nome:'6º Ano A',nivel:'Fundamental',turno:'Manhã'},
  {id:2,nome:'7º Ano B',nivel:'Fundamental',turno:'Tarde'},
  {id:3,nome:'8º Ano A',nivel:'Fundamental',turno:'Manhã'},
  {id:4,nome:'9º Ano C',nivel:'Fundamental',turno:'Tarde'},
  {id:5,nome:'1º EM A', nivel:'Médio',turno:'Manhã'},
  {id:6,nome:'2º EM B', nivel:'Médio',turno:'Noite'},
];
const DISC=['Matemática','Português','História','Geografia','Ciências','Física','Química','Biologia','Ed. Física','Inglês','Arte'];
let PROFS=[
  {id:1,nome:'Prof. Ana Lima',email:'ana@escola.edu',tel:'(86) 99999-1111',disc:'Matemática',turmas:[1,3,5],status:'ativo'},
  {id:2,nome:'Prof. Carlos Souza',email:'carlos@escola.edu',tel:'(86) 99999-2222',disc:'Português',turmas:[2,4,6],status:'ativo'},
  {id:3,nome:'Prof. Marina Costa',email:'marina@escola.edu',tel:'(86) 99999-3333',disc:'História',turmas:[1,2,3],status:'ativo'},
  {id:4,nome:'Prof. João Ferreira',email:'joao@escola.edu',tel:'(86) 99999-4444',disc:'Física',turmas:[5,6],status:'inativo'},
  {id:5,nome:'Prof. Beatriz Alves',email:'bia@escola.edu',tel:'(86) 99999-5555',disc:'Inglês',turmas:[3,4,5],status:'ativo'},
];
const ALUNOS=[
  {id:1,nome:'Alice Mendes',mat:'2024001',turma:1},{id:2,nome:'Bruno Ramos',mat:'2024002',turma:1},
  {id:3,nome:'Carla Nunes',mat:'2024003',turma:1},{id:4,nome:'Diego Lima',mat:'2024004',turma:1},
  {id:5,nome:'Elena Castro',mat:'2024005',turma:1},{id:6,nome:'Felipe Souza',mat:'2024006',turma:1},
  {id:7,nome:'Gabriela Silva',mat:'2024007',turma:2},{id:8,nome:'Hugo Oliveira',mat:'2024008',turma:2},
  {id:9,nome:'Isabela Rocha',mat:'2024009',turma:2},{id:10,nome:'João Pedro',mat:'2024010',turma:2},
  {id:11,nome:'Kaio Martins',mat:'2024011',turma:3},{id:12,nome:'Larissa Pinto',mat:'2024012',turma:3},
  {id:13,nome:'Mateus Freitas',mat:'2024013',turma:5},{id:14,nome:'Nathalia Costa',mat:'2024014',turma:5},
  {id:15,nome:'Otávio Gomes',mat:'2024015',turma:5},
];
let AULAS=[
  {id:1,profId:1,turmaId:1,disc:'Matemática',conteudo:'Equações do 2º grau',materia:'Álgebra',data:'2024-11-18',status:'pendente'},
  {id:2,profId:1,turmaId:3,disc:'Matemática',conteudo:'Funções quadráticas',materia:'Funções',data:'2024-11-19',status:'aprovado'},
  {id:3,profId:2,turmaId:2,disc:'Português',conteudo:'Análise sintática',materia:'Gramática',data:'2024-11-18',status:'pendente'},
  {id:4,profId:3,turmaId:1,disc:'História',conteudo:'Revolução Industrial',materia:'História Moderna',data:'2024-11-17',status:'rejeitado'},
  {id:5,profId:5,turmaId:5,disc:'Inglês',conteudo:'Present Perfect',materia:'Grammar',data:'2024-11-20',status:'pendente'},
  {id:6,profId:1,turmaId:5,disc:'Matemática',conteudo:'Progressão Aritmética',materia:'Sequências',data:'2024-11-15',status:'aprovado'},
];
let presencas={};
let currentPerfil='diretor';
let currentUser=null;

// ── LOGIN ──
function selPerfil(p,el){
  currentPerfil=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function doLogin(){
  const u=document.getElementById('lu').value.trim();
  if(!u){toast('Digite o usuário');return}
  currentUser={nome:u,perfil:currentPerfil};
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  const icons={diretor:'👑',coordenador:'📋',professor:'👨‍🏫'};
  const cols={diretor:'var(--teal)',coordenador:'var(--purple)',professor:'var(--amber)'};
  const labels={diretor:'Diretor',coordenador:'Coordenador',professor:'Professor'};
  document.getElementById('av').textContent=icons[currentPerfil];
  document.getElementById('uname').textContent=u;
  document.getElementById('rtag').textContent=labels[currentPerfil];
  document.getElementById('rtag').style.color=cols[currentPerfil];
  buildSidebar();
  showPage(currentPerfil==='professor'?'pres':'dash');
}
function doLogout(){
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ── SIDEBAR ──
const MENUS={
  diretor:[
    {sec:'Geral'},{id:'dash',icon:'📊',label:'Dashboard'},
    {sec:'Acadêmico'},{id:'aulas-all',icon:'📚',label:'Todas as Aulas'},
    {id:'alunos-dir',icon:'🎓',label:'Alunos'},{id:'turmas-pg',icon:'🏫',label:'Turmas'},
    {sec:'Gestão'},{id:'profs-pg',icon:'👥',label:'Professores'},
    {id:'valid-pg',icon:'✅',label:'Validação de Aulas'},{id:'relat',icon:'📈',label:'Relatórios'},
  ],
  coordenador:[
    {sec:'Geral'},{id:'dash',icon:'📊',label:'Dashboard'},
    {sec:'Cadastros'},{id:'profs-pg',icon:'👥',label:'Professores'},
    {id:'turmas-pg',icon:'🏫',label:'Turmas'},
    {sec:'Validação'},{id:'valid-pg',icon:'✅',label:'Validar Aulas'},
  ],
  professor:[
    {sec:'Minhas Aulas'},{id:'pres',icon:'📋',label:'Chamada'},
    {id:'notas-pg',icon:'📝',label:'Notas'},{id:'conteudo-pg',icon:'📖',label:'Conteúdo da Aula'},
    {sec:'Informações'},{id:'meus-alunos',icon:'🎓',label:'Meus Alunos'},
  ]
};
function buildSidebar(){
  const sb=document.getElementById('sidebar');sb.innerHTML='';
  (MENUS[currentPerfil]||[]).forEach(item=>{
    if(item.sec) sb.innerHTML+=`<div class="ss">${item.sec}</div>`;
    else sb.innerHTML+=`<div class="nav" id="nav-${item.id}" onclick="showPage('${item.id}')"><span class="ni">${item.icon}</span>${item.label}</div>`;
  });
}
function showPage(id){
  document.querySelectorAll('.nav').forEach(n=>n.classList.remove('active'));
  const n=document.getElementById('nav-'+id);if(n)n.classList.add('active');
  const pages={
    dash:pgDash,'aulas-all':pgAulasAll,'alunos-dir':pgAlunos,'turmas-pg':pgTurmas,
    'profs-pg':pgProfs,'valid-pg':pgValid,relat:pgRelat,
    pres:pgPres,'notas-pg':pgNotas,'conteudo-pg':pgConteudo,'meus-alunos':pgMeusAlunos
  };
  const fn=pages[id];
  if(fn)fn();
  else document.getElementById('mc').innerHTML=`<div class="empty"><span class="ei">🚧</span>Em construção</div>`;
}

// ─────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────
function pgDash(){
  const mc=document.getElementById('mc');
  const p=currentPerfil;
  const pend=AULAS.filter(a=>a.status==='pendente').length;
  const aprov=AULAS.filter(a=>a.status==='aprovado').length;
  mc.innerHTML=`
  <div class="phead">
    <h1>${p==='diretor'?'👑 Painel do Diretor':p==='coordenador'?'📋 Painel do Coordenador':'🎓 Dashboard'}</h1>
    <p>Bem-vindo(a), <strong>${currentUser.nome}</strong>! ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
  </div>
  <div class="stats">
    ${p!=='professor'?`

  openModal('Cadastrar Professor',`

function salvarProf(){

function atualizarProf(id){
  const p=PROFS.find(x=>x.id===id);

  p.tel=document.getElementById('ep-tel').value;

  const p=PROFS.find(x=>x.id===id);

function pgValid(){
  document.getElementById('mc').innerHTML=`
  <div class="phead"><h1>✅ Validação de Aulas</h1><p>Aprovar ou rejeitar aulas por professor, turma e disciplina</p></div>
  <div class="filters">
    <select onchange="renderValid()" id="vf-prof">
      <option value="">Todos os Professores</option>
      ${PROFS.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}
    </select>
    <select onchange="renderValid()" id="vf-turma">
      <option value="">Todas as Turmas</option>
      ${TURMAS.map(t=>`<option value="${t.id}">${t.nome}</option>`).join('')}
    </select>
    <select onchange="renderValid()" id="vf-disc">
      <option value="">Todas as Disciplinas</option>
      ${DISC.map(d=>`<option>${d}</option>`).join('')}
    </select>
    <select onchange="renderValid()" id="vf-status">
      <option value="">Todos os Status</option>
      <option value="pendente">⏳ Pendentes</option>
      <option value="aprovado">✅ Aprovadas</option>
      <option value="rejeitado">❌ Rejeitadas</option>
    </select>
  </div>
  <div id="valid-list"></div>`;
  renderValid();
}
function renderValid(){
  const fp=document.getElementById('vf-prof')?.value||'';
  const ft=document.getElementById('vf-turma')?.value||'';
  const fd=document.getElementById('vf-disc')?.value||'';
  const fs=document.getElementById('vf-status')?.value||'';
  let list=[...AULAS];
  if(fp)list=list.filter(a=>a.profId===parseInt(fp));
  if(ft)list=list.filter(a=>a.turmaId===parseInt(ft));
  if(fd)list=list.filter(a=>a.disc===fd);
  if(fs)list=list.filter(a=>a.status===fs);
  const div=document.getElementById('valid-list');if(!div)return;
  if(!list.length){div.innerHTML=`<div class="empty"><span class="ei">📭</span>Nenhuma aula encontrada</div>`;return}
  div.innerHTML=list.map(a=>{
    const prof=PROFS.find(p=>p.id===a.profId);
    const turma=TURMAS.find(t=>t.id===a.turmaId);
    return `<div class="aula-card">
      <div class="aula-info" style="flex:1">
        <h4>${a.disc} — ${a.conteudo}</h4>
        <div class="ameta">
          <span>👨‍🏫 ${prof?.nome||'—'}</span>
          <span>🏫 ${turma?.nome||'—'}</span>
          <span>📚 ${a.materia}</span>
          <span>📅 ${fmtD(a.data)}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${bStatus(a.status)}
        ${a.status==='pendente'?`
          <button class="btn btn-s btn-sm" onclick="validar(${a.id},'aprovado')">✅ Aprovar</button>
          <button class="btn btn-d btn-sm" onclick="validar(${a.id},'rejeitado')">❌ Rejeitar</button>`:''}
        ${a.status!=='pendente'?`<button class="btn btn-g btn-sm" onclick="validar(${a.id},'pendente')">↩ Resetar</button>`:''}
      </div>
    </div>`;}).join('');
}
function validar(id,status){
  const a=AULAS.find(x=>x.id===id);if(a)a.status=status;
  renderValid();
  toast(status==='aprovado'?'Aula aprovada! ✅':status==='rejeitado'?'Aula rejeitada! ❌':'Status resetado');
}

        <div>
          <div style="font-size:14px;font-weight:700">${a.nome}</div>
          <div style="font-size:12px;color:var(--muted)">${a.mat}</div>
        </div>
        <div class="pres-btns">
          <button class="pbt" id="pb-P-${a.id}" onclick="setPres(${a.id},'P')" title="Presente">P</button>
          <button class="pbt" id="pb-F-${a.id}" onclick="setPres(${a.id},'F')" title="Falta">F</button>
          <button class="pbt" id="pb-J-${a.id}" onclick="setPres(${a.id},'J')" title="Justificada">J</button>
        </div>
      </div>`).join('')}
    </div>
  </div>
  <div class="tcard">
    <div class="tcard-head"><h3>📄 Justificativas de Falta</h3></div>
    <div style="padding:16px">
      ${als.map(a=>`
      <div style="margin-bottom:12px">
        <label style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px">${a.nome}</label>
        <textarea id="just-${a.id}" placeholder="Justificativa (opcional)..."
          style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Quicksand',sans-serif;font-size:13px;resize:none;height:52px;outline:none"></textarea>
      </div>`).join('')}
    </div>
  </div>`;
}
function setPres(aid,tipo){
  ['P','F','J'].forEach(t=>{
    const b=document.getElementById(`pb-${t}-${aid}`);
    if(b){b.className='pbt';if(t===tipo)b.classList.add('sel-'+tipo);}
  });
  presencas[aid]=tipo;
}
function salvarChamada(){toast('Chamada salva com sucesso! ✅')}

// ─────────────────────────────────────
// NOTAS (PROFESSOR)
// ─────────────────────────────────────
function pgNotas(){
  document.getElementById('mc').innerHTML=`
  <div class="phead"><h1>📝 Notas</h1><p>Lançamento de notas por turma</p></div>
  <div class="filters">
    <select id="nt-turma" onchange="renderNotas()">
      <option value="">Selecione a turma...</option>
      ${TURMAS.map(t=>`<option value="${t.id}">${t.nome}</option>`).join('')}
    </select>
    <select id="nt-bim">
      <option>1º Bimestre</option><option>2º Bimestre</option>
      <option>3º Bimestre</option><option>4º Bimestre</option>
    </select>
  </div>
  <div id="notas-body"></div>`;
}
function renderNotas(){
  const tid=parseInt(document.getElementById('nt-turma').value);
  const div=document.getElementById('notas-body');
  if(!tid){div.innerHTML='';return}
  const als=ALUNOS.filter(a=>a.turma===tid);
  if(!als.length){div.innerHTML=`<div class="empty"><span class="ei">🎓</span>Nenhum aluno</div>`;return}
  div.innerHTML=`
  <div class="tcard">
    <div class="tcard-head">
      <h3>📝 ${TURMAS.find(t=>t.id===tid)?.nome}</h3>
      <button class="btn btn-p btn-sm" onclick="toast('Notas salvas! ✅')">💾 Salvar Notas</button>
    </div>
    <table><thead><tr><th>Aluno</th><th>Matrícula</th><th>Nota 1</th><th>Nota 2</th><th>Média</th><th>Situação</th></tr></thead>
    <tbody>${als.map(a=>`<tr>
      <td><strong>${a.nome}</strong></td>
      <td style="color:var(--muted)">${a.mat}</td>
      <td><input class="nota-in" id="n1-${a.id}" type="number" min="0" max="10" step="0.1" placeholder="—" oninput="calcMed(${a.id})"></td>
      <td><input class="nota-in" id="n2-${a.id}" type="number" min="0" max="10" step="0.1" placeholder="—" oninput="calcMed(${a.id})"></td>
      <td id="med-${a.id}" style="font-weight:800;font-size:16px">—</td>
      <td id="sit-${a.id}">—</td></tr>`).join('')}
    </tbody></table>
  </div>`;
}
function calcMed(id){
  const v1=parseFloat(document.getElementById('n1-'+id)?.value)||0;
  const v2=parseFloat(document.getElementById('n2-'+id)?.value)||0;
  const med=((v1+v2)/2).toFixed(1);
  const m=document.getElementById('med-'+id);
  const s=document.getElementById('sit-'+id);
  if(m)m.textContent=med;
  if(s){
    const n=parseFloat(med);
    s.innerHTML=n>=7?'<span class="badge bg">✅ Aprovado</span>':n>=5?'<span class="badge by">⚠️ Recuperação</span>':'<span class="badge br">❌ Reprovado</span>';
  }
}

// ─────────────────────────────────────
// CONTEÚDO DA AULA (PROFESSOR)
// ─────────────────────────────────────
function pgConteudo(){
  document.getElementById('mc').innerHTML=`
  <div class="phead"><h1>📖 Conteúdo da Aula</h1><p>Registre o conteúdo ministrado em cada aula</p></div>
  <div class="tcard" style="padding:24px">
    <div class="fgrid">
      <div class="fg"><label>Turma</label>
        <select id="ca-turma"><option value="">Selecione...</option>
          ${TURMAS.map(t=>`<option value="${t.id}">${t.nome}</option>`).join('')}
        </select></div>
      <div class="fg"><label>Disciplina</label>
        <select id="ca-disc">${DISC.map(d=>`<option>${d}</option>`).join('')}</select></div>
      <div class="fg"><label>Matéria / Unidade</label>
        <input id="ca-mat" placeholder="Ex: Álgebra, Gramática..."></div>
      <div class="fg"><label>Data da Aula</label>
        <input id="ca-data" type="date" value="${today()}"></div>
    </div>
    <div class="fg" style="margin-bottom:14px">
      <label>Conteúdo Ministrado</label>
      <textarea id="ca-cont" style="min-height:100px" placeholder="Descreva detalhadamente o conteúdo abordado..."></textarea>
    </div>
    <div class="fg" style="margin-bottom:20px">
      <label>Observações</label>
      <textarea id="ca-obs" placeholder="Observações adicionais (opcional)..."></textarea>
    </div>
    <button class="btn btn-p" onclick="salvarConteudo()">💾 Registrar Aula</button>
  </div>
  <div class="tcard" style="margin-top:20px">
    <div class="tcard-head"><h3>📚 Minhas Aulas Registradas</h3></div>
    <div style="padding:12px 16px" id="minhas-aulas">
      ${AULAS.map(a=>`<div class="aula-card">
        <div class="aula-info" style="flex:1">
          <h4>${a.disc} — ${a.conteudo}</h4>
          <div class="ameta">
            <span>🏫 ${TURMAS.find(t=>t.id===a.turmaId)?.nome||'—'}</span>
            <span>📚 ${a.materia}</span>
            <span>📅 ${fmtD(a.data)}</span>
          </div>
        </div>
        <div>${bStatus(a.status)}</div>
      </div>`).join('')}
    </div>
  </div>`;
}
function salvarConteudo(){
  const tid=document.getElementById('ca-turma').value;
  const cont=document.getElementById('ca-cont').value.trim();
  if(!tid||!cont){toast('Preencha a turma e o conteúdo');return}
  const novaAula={id:Date.now(),profId:1,turmaId:parseInt(tid),
    disc:document.getElementById('ca-disc').value,
    materia:document.getElementById('ca-mat').value||'—',
    conteudo:cont,data:document.getElementById('ca-data').value,status:'pendente'};
  AULAS.push(novaAula);
  toast('Aula registrada! Aguardando validação 🎉');
  document.getElementById('ca-turma').value='';
  document.getElementById('ca-cont').value='';
  document.getElementById('ca-obs').value='';
  document.getElementById('ca-mat').value='';
  const div=document.getElementById('minhas-aulas');
  if(div) div.innerHTML=`<div class="aula-card">
    <div class="aula-info" style="flex:1">
      <h4>${novaAula.disc} — ${novaAula.conteudo}</h4>
      <div class="ameta"><span>📅 ${fmtD(novaAula.data)}</span></div>
    </div>
    <div>${bStatus('pendente')}</div>
  </div>`+div.innerHTML;
}

// ─────────────────────────────────────
// MEUS ALUNOS (PROFESSOR)
// ─────────────────────────────────────
function pgMeusAlunos(){
  document.getElementById('mc').innerHTML=`
  <div class="phead"><h1>🎓 Meus Alunos</h1><p>Lista de alunos das suas turmas</p></div>
  <div class="filters">
    <select onchange="renderMeusAlunos(this.value)">
      <option value="">Todas as Turmas</option>
      ${TURMAS.map(t=>`<option value="${t.id}">${t.nome}</option>`).join('')}
    </select>
  </div>
  <div class="tcard"><table>
    <thead><tr><th>Nome</th><th>Matrícula</th><th>Turma</th></tr></thead>
    <tbody id="tb-ma"></tbody>
  </table></div>`;
  renderMeusAlunos('');
}
function renderMeusAlunos(tid){
  const tb=document.getElementById('tb-ma');if(!tb)return;
  const list=tid?ALUNOS.filter(a=>a.turma===parseInt(tid)):[...ALUNOS];
  tb.innerHTML=list.map(a=>`<tr>
    <td><strong>${a.nome}</strong></td>
    <td style="color:var(--muted)">${a.mat}</td>
    <td>${TURMAS.find(t=>t.id===a.turma)?.nome||'—'}</td></tr>`).join('');
}

// ─────────────────────────────────────
// HELPERS
// ─────────────────────────────────────
function bStatus(s){
  const map={aprovado:['bg','✅ Aprovado'],pendente:['by','⏳ Pendente'],rejeitado:['br','❌ Rejeitado']};
  const [cls,lbl]=map[s]||['bs',s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}
function fmtD(d){if(!d)return'—';const[y,m,dy]=d.split('-');return`${dy}/${m}/${y}`}
function today(){return new Date().toISOString().split('T')[0]}
function openModal(title,body,btns){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  document.getElementById('mbtns').innerHTML=btns||'';
  document.getElementById('mbg').classList.add('open');
}
function closeModal(){document.getElementById('mbg').classList.remove('open')}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
